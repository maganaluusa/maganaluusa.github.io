<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Magana Luusa</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --primary: #e62b1e; --text: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-top: 100px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 5%; position: fixed; width: 100%; top: 0; z-index: 100; box-sizing: border-box; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); }
        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; text-decoration: none; color: var(--text); }
        .nav-links a { color: var(--text); text-decoration: none; margin-left: 30px; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .page-title { text-align: center; font-family: 'Syncopate', sans-serif; font-size: 3rem; text-transform: uppercase; margin: 40px 0; }
        .gallery-container { padding: 0 5% 100px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .gallery-item { width: 100%; height: 300px; overflow: hidden; border-radius: 4px; background: #1a1a1a; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
