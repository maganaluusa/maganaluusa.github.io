# Static HTML only — no Jekyll. Use this when GitHub’s default “dynamic” Pages
# build keeps failing or cancelling on large images / non-Jekyll content.
#
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
# If an older “pages-build-deployment” workflow also exists, disable or remove it
# so only this workflow runs.

name: Deploy static site to Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
