<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Magana Luusa</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --surface: #141414; --primary: #e62b1e; --text: #ffffff; --text-dim: #a0a0a0; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 5%; width: 100%; box-sizing: border-box; }
        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; text-decoration: none; color: var(--text); }
        .nav-links a { color: var(--text); text-decoration: none; margin-left: 30px; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        
        .contact-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5% 100px 5%; text-align: center; }
        .contact-container h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2.5rem, 5vw, 4rem); text-transform: uppercase; margin-bottom: 20px; }
        .contact-container p { color: var(--text-dim); font-size: 1.2rem; max-width: 600px; margin-bottom: 50px; }
        
        .contact-grid { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        .contact-item { background: var(--surface); padding: 40px 60px; border-radius: 8px; border: 1px solid #222; transition: border-color 0.3s; }
        .contact-item:hover { border-color: var(--primary); }
        .contact-item h3 { font-family: 'Syncopate', sans-serif; color: var(--primary); margin-top: 0; font-size: 1rem; letter-spacing: 2px; }
        .contact-item a, .contact-item span { color: white; text-decoration: none; font-size: 1.3rem; font-weight: 600; }
        .contact-item a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Magana Luusa</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <div class="contact-container">
        <h1>Let's Work <br>Together</h1>
        <p>For sponsorship inquiries, media requests, or to discuss partnership opportunities, please reach out via the channels below.</p>
        
        <div class="contact-grid">
            <div class="contact-item">
                <h3>Email</h3>
                <a href="mailto:maganaluusa@gmail.com">maganaluusa@gmail.com</a>
            </div>
            <div class="contact-item">
                <h3>Phone</h3>
                <span>+254 706 717 179</span>
            </div>
            <div class="contact-item">
                <h3>Instagram</h3>
                <a href="https://instagram.com/maganaluusa" target="_blank">@maganaluusa</a>
            </div>
        </div>
    </div>
</body>
</html>
